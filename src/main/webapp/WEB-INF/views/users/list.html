<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Users</title>
</head>
<body>
<h1>Users</h1>


<h2>Add User</h2>
<form th:action="@{/users/add}" method="post">
    <label>Name: <input type="text" name="name"/></label>
    <label>Postal code: <input type="text" name="postalCode"/></label>
    <label>Age: <input type="text" name="age"/></label>
    <button type="submit">Add!</button>
</form>

<hr/>


<h2>All Users</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Postal code</th>
        <th>Age</th>
        <th>Update</th>
        <th>Delete</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.postalCode}"></td>
        <td th:text="${user.age}"></td>

        <!-- Колонка обновления -->
        <td>
            <form th:action="@{/users/update}" method="post">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <input type="text" name="name" th:value="${user.name}"/>
                <input type="text" name="postalCode" th:value="${user.postalCode}"/>
                <input type="text" name="age" th:value="${user.age}"/>
                <button type="submit">Update!</button>
            </form>
        </td>

        <!-- Колонка удаления -->
        <td>
            <form th:action="@{/users/delete}" method="post">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <button type="submit">Delete!</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
